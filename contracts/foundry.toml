[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[rpc_endpoints]
celo_sepolia = "${RPC_URL_TESTNET}"
celo = "${RPC_URL_MAINNET}"

[etherscan]
celo_sepolia = { key = "${CELOSCAN_API}", chain = 11142220, url = "https://api.etherscan.io/v2/api" }
celo = { key = "${CELOSCAN_API}", chain = 42220, url = "https://api.celoscan.io/api" }
